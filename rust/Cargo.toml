[package]
name = "CoreShift"
version = "0.2.0"
edition = "2024"

[dependencies]
blake3 = { version = "1.8" }
bytemuck = { version = "1.2" }
lazy_static = { version = "1.5" }
libc = { version = "0.2" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
smallvec = { version = "1.13", features = ["serde"] }
arrayvec = { version = "0.7", features = ["serde"] }
bincode = "1.3"

[lib]
path = "src/lib.rs"

[[bin]]
name = "CoreShift"
path = "src/main.rs"
