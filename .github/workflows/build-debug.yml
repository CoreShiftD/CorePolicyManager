name: Build CorePolicyManager (Debug)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install Android Toolchain Components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;28.0.13004108"

      - name: Build Rust Daemon for Android
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          NDK="$SDK_ROOT/ndk/28.0.13004108"
          
          if [ ! -d "$NDK" ]; then
            echo "NDK not found at $NDK"
            exit 1
          fi
          
          export ANDROID_NDK_HOME="$NDK"
          export ANDROID_NDK_ROOT="$NDK"
          export PATH="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          
          ./scripts/build-rust-android.sh

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew spotlessCheck
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Verify APK and ABIs
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "ERROR: Debug APK not found."
            exit 1
          fi
          
          echo "Verifying ABIs and Rust payloads..."
          # Verify allowed ABIs
          UNSUPPORTED_ABIS=$(unzip -l "$APK" | grep "lib/" | grep -vE "lib/(arm64-v8a|armeabi-v7a)/" || true)
          if [ -n "$UNSUPPORTED_ABIS" ]; then
            echo "ERROR: Unsupported ABIs found in APK:"
            echo "$UNSUPPORTED_ABIS"
            exit 1
          fi
          
          # Verify specific Rust payloads
          unzip -l "$APK" | grep "lib/arm64-v8a/libcoreshift.so"
          unzip -l "$APK" | grep "lib/armeabi-v7a/libcoreshift.so"
          
          echo "Verification passed: Correct ABIs and Rust payloads detected."

      - name: Build Summary
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          echo "### Debug Build Result" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | $(du -h "$APK" | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          
          echo "#### Native Contents" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          unzip -l "$APK" | grep "lib/" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CorePolicyManager-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
