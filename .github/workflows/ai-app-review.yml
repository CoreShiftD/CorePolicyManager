name: AI App Review (Gemini)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Manual quality pass'
      model:
        description: 'Gemini model to use'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - flash
          - pro
          - flash-lite
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: ai-app-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    environment:
      name: ai-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          DAILY_BRANCH="ai/app-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"
          
          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Node
        if: env.REBASE_FAILED != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Gemini CLI
        if: env.REBASE_FAILED != 'true'
        run: npm install -g @google/gemini-cli

      - name: Setup Java 25
        if: env.REBASE_FAILED != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Gemini Agentic Edit
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_MODEL: ${{ github.event.inputs.model || 'auto' }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          
          case "$INPUT_MODEL" in
            pro) MODEL_NAME="gemini-1.5-pro" ;;
            flash-lite) MODEL_NAME="gemini-1.5-flash-8b" ;;
            *) MODEL_NAME="gemini-1.5-flash" ;;
          esac
          
          PROMPT="You are editing the CorePolicyManager Android app. Make ONE tiny safe improvement only. Allowed paths: app/ excluding app/src/main/jniLibs/**/*.so, core/, feature/, gradle/, build.gradle.kts, settings.gradle.kts, gradle.properties, README.md. Prefer formatting, docs alignment, small Compose/Gradle cleanup, or maintainability improvements. Do not redesign architecture. Do not add dependencies unless clearly necessary. Do not touch generated artifacts, secrets, ai_context.md. Stop after one small change."
          
          echo "Running Gemini CLI in auto-edit mode with model: $MODEL_NAME"
          gemini \
            --model "$MODEL_NAME" \
            --approval-mode=auto_edit \
            --prompt "$PROMPT" > gemini_output.txt 2>&1 || (cat gemini_output.txt && exit 1)

      - name: Inspect Diff and Safety
        if: env.REBASE_FAILED != 'true'
        run: |
          git diff > git-diff.patch
          git status --short
          
          if [ ! -s git-diff.patch ]; then
            echo "GEMINI_EDIT_PRODUCED=none" >> "$GITHUB_ENV"
            exit 0
          fi
          
          FILES_CHANGED=$(git diff --name-only | wc -l)
          LINES_CHANGED=$(git diff --shortstat | awk '{print ($4 + $6)}' || echo 0)
          
          if [ "$FILES_CHANGED" -gt 1 ] || [ "$LINES_CHANGED" -gt 50 ]; then
            echo "ERROR: Gemini edit exceeded strict limits (Files: $FILES_CHANGED, Lines: $LINES_CHANGED)"
            git restore --worktree --staged .
            echo "GEMINI_EDIT_PRODUCED=exceeded_limits" >> "$GITHUB_ENV"
            exit 1
          fi
          
          if git status --short | grep -E "ai_context|target/|build/|\.gradle/|jniLibs/|secrets"; then
            echo "ERROR: Unsafe file changes detected. Reverting."
            git restore --worktree --staged .
            echo "GEMINI_EDIT_PRODUCED=unsafe" >> "$GITHUB_ENV"
            exit 1
          fi
          
          echo "GEMINI_EDIT_PRODUCED=true" >> "$GITHUB_ENV"

      - name: Validate (App)
        if: env.REBASE_FAILED != 'true' && env.GEMINI_EDIT_PRODUCED == 'true'
        run: |
          chmod +x gradlew
          ./gradlew spotlessApply
          ./gradlew spotlessCheck
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Cleanup and Commit
        if: env.REBASE_FAILED != 'true' && env.GEMINI_EDIT_PRODUCED == 'true'
        run: |
          git restore --staged app/src/main/jniLibs || true
          git restore app/src/main/jniLibs || true
          
          git add app/ core/ feature/ gradle/ build.gradle.kts settings.gradle.kts gradle.properties README.md .gitignore
          if ! git diff --staged --quiet; then
            git commit -m "AI(app): apply Gemini agentic improvement"
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-app-artifacts
          path: |
            gemini_output.txt
            git-diff.patch
          retention-days: 7

      - name: Handle Conflict
        if: env.REBASE_FAILED == 'true'
        run: |
          git rebase --abort
          exit 0

      - name: Push Daily Branch
        if: env.REBASE_FAILED != 'true' && env.GEMINI_EDIT_PRODUCED == 'true'
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" == "main" ]; then
            echo "ERROR: Direct push to main detected."
            exit 1
          fi
          
          if [[ "$CURRENT_BRANCH" == ai/app-* ]]; then
            git fetch origin "$CURRENT_BRANCH"
            git rebase "origin/$CURRENT_BRANCH" || (git rebase --abort && exit 0)
            git push origin "$CURRENT_BRANCH"
          fi
