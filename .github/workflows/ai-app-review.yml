name: AI App Review (Gemini)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Manual quality pass'
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: ai-app-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    environment:
      name: ai-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          DAILY_BRANCH="ai/app-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"
          
          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Java 25
        if: env.REBASE_FAILED != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Gemini Code Improvement
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          
          # 1. Collect context
          {
            find app/ core/ feature/ gradle/ -type f -not -path '*/.*' -not -name "*.so" -maxdepth 4
            echo "build.gradle.kts"
            echo "settings.gradle.kts"
            echo "gradle.properties"
            echo "README.md"
            echo ".gitignore"
          } | while read -r f; do
            if [ -f "$f" ]; then
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            fi
          done > full_context.txt

          # 2. Call Gemini
          PROMPT_PREFIX="You are a senior software engineer. Review the following files and provide small, safe, reviewable improvements (lint fixes, formatting, better error handling, documentation). Return ONLY a unified diff patch that can be applied with 'git apply'. Do not include markdown code blocks. Do not include any explanation or other text. Scope: Android App and build system."
          
          jq -n --arg prefix "$PROMPT_PREFIX" --rawfile context full_context.txt \
            '{contents: [{parts: [{text: ($prefix + "\n\nFiles:\n" + $context)}]}]}' > payload.json

          curl -s -X POST -H 'Content-Type: application/json' \
            -d @payload.json \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY" > response.json

          # 3. Extract and Clean Patch
          jq -r '.candidates[0].content.parts[0].text' response.json | sed '/^```/d' > gemini.patch

          if [ ! -s gemini.patch ] || ! grep -q "^diff --git" gemini.patch; then
            echo "PATCH_PRODUCED=false" >> "$GITHUB_ENV"
          else
            if git apply --check gemini.patch; then
              git apply gemini.patch
              echo "PATCH_PRODUCED=true" >> "$GITHUB_ENV"
            else
              echo "PATCH_PRODUCED=invalid" >> "$GITHUB_ENV"
            fi
          fi

      - name: Validate (App)
        if: env.REBASE_FAILED != 'true' && env.PATCH_PRODUCED == 'true'
        run: |
          chmod +x gradlew
          ./gradlew spotlessApply
          ./gradlew spotlessCheck
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Cleanup Build Artifacts
        if: env.REBASE_FAILED != 'true'
        run: |
          git restore --staged app/src/main/jniLibs || true
          git restore app/src/main/jniLibs || true
          rm -f full_context.txt payload.json response.json gemini.patch

      - name: Inspect and Commit
        if: env.REBASE_FAILED != 'true'
        run: |
          if [ "$PATCH_PRODUCED" == "true" ]; then
            git status --short
            
            if git status --short | grep -E "ai_context|target/|build/|\.gradle/|jniLibs/|secrets"; then
              echo "ERROR: Unsafe file changes detected. Aborting commit."
              exit 1
            fi
            
            git add app/ core/ feature/ gradle/ build.gradle.kts settings.gradle.kts gradle.properties README.md .gitignore
            if ! git diff --staged --quiet; then
              git commit -m "AI(app): apply Gemini patch"
            fi
          else
            mkdir -p reports/ai/app
            REPORT_FILE="reports/ai/app/no-patch-$(date -u +'%Y-%m-%d-%H-%M').md"
            echo "# Gemini Audit - No Patch" > "$REPORT_FILE"
            echo "Status: $PATCH_PRODUCED" >> "$REPORT_FILE"
            git add "$REPORT_FILE"
            git commit -m "AI(app): record Gemini no-op audit"
          fi

      - name: Handle Conflict
        if: env.REBASE_FAILED == 'true'
        run: |
          mkdir -p reports/ai/app
          CONFLICT_FILE="reports/ai/app/conflict-$(date -u +'%Y-%m-%d-%H-%M').md"
          echo "# Rebase Conflict Report" > "$CONFLICT_FILE"
          echo "Failed to rebase $DAILY_BRANCH onto origin/main." >> "$CONFLICT_FILE"
          git add "$CONFLICT_FILE"
          git commit -m "AI(app): report rebase conflict"
          git push origin "$DAILY_BRANCH"
          exit 0

      - name: Push Daily Branch
        if: env.REBASE_FAILED != 'true'
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" == "main" ]; then
            echo "ERROR: Direct push to main detected."
            exit 1
          fi
          if [[ "$CURRENT_BRANCH" == ai/app-* ]]; then
            git push origin "$CURRENT_BRANCH"
          fi
