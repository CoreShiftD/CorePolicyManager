name: AI App Review (Gemini)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Manual quality pass'
      model:
        description: 'Gemini model to use'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - flash
          - pro
          - flash-lite
      deep_mode:
        description: 'Increase file/line limits for this session'
        type: boolean
        default: false
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: ai-app-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    environment:
      name: ai-audit

    env:
      SESSION_SECONDS: 1800
      IMPROVE_UNTIL_SECONDS: 1500
      PASS_SLEEP_SECONDS: 10
      MAX_FAILED_PASSES: 3
      MAX_NO_CHANGE_PASSES: 3
      MAX_RECOVERY_PASSES: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          DAILY_BRANCH="ai/app-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"
          
          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Node
        if: env.REBASE_FAILED != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Gemini CLI
        if: env.REBASE_FAILED != 'true'
        run: npm install -g @google/gemini-cli

      - name: Setup Java 25
        if: env.REBASE_FAILED != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Diagnostics and Model Selection
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_MODEL: ${{ github.event.inputs.model || 'auto' }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          echo "Fetching available models..."
          curl -s "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" > models_raw.json
          AVAILABLE_MODELS=$(jq -r '.models[] | select(.supportedGenerationMethods[]? == "generateContent") | .name' models_raw.json | sed 's/models\///')
          
          case "$INPUT_MODEL" in
            pro) REQUESTED="gemini-2.5-pro gemini-2.0-pro gemini-1.5-pro" ;;
            flash-lite) REQUESTED="gemini-2.5-flash-lite gemini-2.0-flash-lite gemini-1.5-flash-8b" ;;
            *) REQUESTED="gemini-2.5-flash gemini-2.0-flash gemini-1.5-flash-latest" ;;
          esac

          FALLBACK_ORDER="$REQUESTED gemini-2.5-flash gemini-2.0-flash gemini-1.5-flash-latest"
          RESOLVED_MODEL=""
          for m in $FALLBACK_ORDER; do
            if echo "$AVAILABLE_MODELS" | grep -q "^$m$"; then RESOLVED_MODEL="$m"; break; fi
          done
          if [ -z "$RESOLVED_MODEL" ]; then echo "No supported model found"; exit 1; fi
          echo "SELECTED_MODEL=$RESOLVED_MODEL" >> "$GITHUB_ENV"

      - name: AI Session Loop
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          DEEP_MODE: ${{ github.event.inputs.deep_mode }}
        run: |
          START_TIME=$(date +%s)
          FAILED_PASSES=0
          NO_CHANGE_PASSES=0
          PASS_COUNT=0
          RECOVERY_MODE=false
          RECOVERY_COUNT=0
          LAST_FAILURE_LOG=""
          
          # Patch limits
          if [ "$DEEP_MODE" = "true" ]; then
            LIMIT_FILES=5
            LIMIT_LINES=300
          else
            LIMIT_FILES=3
            LIMIT_LINES=180
          fi
          
          mkdir -p session_artifacts/app
          
          while [ $(( $(date +%s) - START_TIME )) -lt $IMPROVE_UNTIL_SECONDS ]; do
            PASS_COUNT=$((PASS_COUNT + 1))
            echo "--- PASS $PASS_COUNT ---"
            PASS_DIR="session_artifacts/app/pass-$PASS_COUNT"
            mkdir -p "$PASS_DIR"
            
            if [ "$RECOVERY_MODE" = "true" ]; then
              echo "Entering RECOVERY MODE (Attempt $((RECOVERY_COUNT + 1)))"
              ERROR_SUMMARY=$(cat "$LAST_FAILURE_LOG" | head -n 50)
              PROMPT="You are a senior maintenance engineer. You previously made a change that failed validation. Fix the compile/test errors below. Do not make unrelated changes. Return/edit only the minimum necessary fix.
              Error log:
              $ERROR_SUMMARY
              End with SUMMARY: fixed previous validation errors."
            else
              # Ensure repo is clean before new improvement
              if ! git diff --quiet || ! git diff --cached --quiet; then
                echo "Repo dirty unexpectedly. Restoring."
                git restore --worktree --staged .
                git clean -fd --exclude=session_artifacts/
              fi
              PROMPT="You are a senior maintenance engineer. Make one high-value improvement to the CorePolicyManager Android app. Priorities: build/release config, Compose stability, state handling, lints. Avoid trivial edits. Max $LIMIT_FILES files and $LIMIT_LINES lines. Stop after one focused change. End with SUMMARY: <short description>."
            fi
            
            gemini --model "${{ env.SELECTED_MODEL }}" --approval-mode=auto_edit --skip-trust --prompt "$PROMPT" > "$PASS_DIR/gemini_output.txt" 2>&1 || true
            
            git diff > "$PASS_DIR/git-diff.patch"
            git status --short > "$PASS_DIR/status.txt"
            
            if [ ! -s "$PASS_DIR/git-diff.patch" ]; then
              echo "No changes."
              if [ "$RECOVERY_MODE" = "true" ]; then
                echo "Recovery produced no changes. This is a recovery failure."
                git restore --worktree --staged .
                git clean -fd --exclude=session_artifacts/
                RECOVERY_MODE=false
                FAILED_PASSES=$((FAILED_PASSES + 1))
                echo "status=recovery_no_change" >> "$PASS_DIR/status.txt"
              else
                NO_CHANGE_PASSES=$((NO_CHANGE_PASSES + 1))
                echo "status=no_change" >> "$PASS_DIR/status.txt"
              fi
            else
              FILES_CHANGED=$(git diff --name-only | wc -l)
              LINES_CHANGED=$(git diff --shortstat | awk '{print ($4 + $6)}' || echo 0)
              
              if [ "$FILES_CHANGED" -gt "$LIMIT_FILES" ] || [ "$LINES_CHANGED" -gt "$LIMIT_LINES" ] || (git status --short | grep -E "ai_context|target/|build/|\.gradle/|jniLibs/|secrets"); then
                echo "Rejected: unsafe or too large."
                git restore --worktree --staged .
                git clean -fd --exclude=session_artifacts/
                if [ "$RECOVERY_MODE" = "true" ]; then
                   RECOVERY_MODE=false
                fi
                FAILED_PASSES=$((FAILED_PASSES + 1))
                echo "status=rejected_safety" >> "$PASS_DIR/status.txt"
              else
                echo "Validating pass $PASS_COUNT..."
                if ./gradlew spotlessApply && ./gradlew spotlessCheck; then
                  SUMMARY=$(grep "SUMMARY:" "$PASS_DIR/gemini_output.txt" | tail -n 1 | sed 's/SUMMARY: //')
                  git add app/ core/ feature/ gradle/ build.gradle.kts settings.gradle.kts gradle.properties README.md .gitignore
                  git commit -m "AI(app): improve $SUMMARY (pass $PASS_COUNT)"
                  echo "Pass $PASS_COUNT successful."
                  NO_CHANGE_PASSES=0
                  FAILED_PASSES=0
                  RECOVERY_MODE=false
                  RECOVERY_COUNT=0
                  echo "status=success" >> "$PASS_DIR/status.txt"
                else
                  echo "Validation failed."
                  LAST_FAILURE_LOG="$PASS_DIR/validation.log"
                  (./gradlew spotlessCheck) > "$LAST_FAILURE_LOG" 2>&1 || true
                  
                  RECOVERY_COUNT=$((RECOVERY_COUNT + 1))
                  if [ $RECOVERY_COUNT -ge $MAX_RECOVERY_PASSES ]; then
                    echo "Max recovery attempts reached. Reverting everything for this pass."
                    git restore --worktree --staged .
                    git clean -fd --exclude=session_artifacts/
                    RECOVERY_MODE=false
                    RECOVERY_COUNT=0
                    FAILED_PASSES=$((FAILED_PASSES + 1))
                    echo "status=failed_recovery_max_reached" >> "$PASS_DIR/status.txt"
                  else
                    RECOVERY_MODE=true
                    echo "status=failed_validation_recovery_started" >> "$PASS_DIR/status.txt"
                  fi
                fi
              fi
            fi
            
            if [ $FAILED_PASSES -ge $MAX_FAILED_PASSES ]; then echo "Max failures reached."; break; fi
            if [ $NO_CHANGE_PASSES -ge $MAX_NO_CHANGE_PASSES ]; then echo "Max no-change reached."; break; fi
            sleep $PASS_SLEEP_SECONDS
          done

      - name: Final Validation and Push
        if: env.REBASE_FAILED != 'true'
        run: |
          # Final full build check
          ./gradlew :app:assembleDebug --stacktrace --no-daemon
          
          if [[ "${{ env.DAILY_BRANCH }}" == ai/app-* ]]; then
            git fetch origin "${{ env.DAILY_BRANCH }}"
            git rebase "origin/${{ env.DAILY_BRANCH }}" || (git rebase --abort && exit 0)
            git push origin "${{ env.DAILY_BRANCH }}"
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-app-session-artifacts
          path: session_artifacts/
          retention-days: 3
