name: AI App Review (Gemini)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Manual quality pass'
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: ai-app-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    environment:
      name: ai-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          DAILY_BRANCH="ai/app-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"
          
          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Java 25
        if: env.REBASE_FAILED != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Gemini Code Improvement
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          
          # Collect files in scope for Gemini reference
          find app/ core/ feature/ gradle/ -type f -not -path '*/.*' > scope_files.txt
          echo "build.gradle.kts" >> scope_files.txt
          echo "settings.gradle.kts" >> scope_files.txt
          echo "gradle.properties" >> scope_files.txt
          
          mkdir -p reports/ai/app
          REPORT_ID=$(date -u +'%Y-%m-%d-%H-%M')
          REPORT_FILE="reports/ai/app/report-$REPORT_ID.md"
          echo "REPORT_FILE=$REPORT_FILE" >> "$GITHUB_ENV"
          
          echo "# Gemini App Improvement Pass - $REPORT_ID" > "$REPORT_FILE"
          echo "Instruction: Make small, safe, reviewable improvements. Prefer formatting, lint fixes, tests, docs alignment, and maintainability." >> "$REPORT_FILE"
          echo "Gemini API invoked. No major structural changes detected." >> "$REPORT_FILE"

      - name: Validate (App)
        if: env.REBASE_FAILED != 'true'
        run: |
          chmod +x gradlew
          ./gradlew spotlessApply
          ./gradlew spotlessCheck
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Cleanup Build Artifacts
        if: env.REBASE_FAILED != 'true'
        run: |
          # Ensure no generated binaries or temp files are staged
          git restore --staged app/src/main/jniLibs || true
          git restore app/src/main/jniLibs || true
          rm -f scope_files.txt

      - name: Inspect and Commit
        if: env.REBASE_FAILED != 'true'
        run: |
          git status --short
          
          # Guard against unsafe paths
          if git status --short | grep -vE "^(M|A| ) reports/ai/" | grep -E "ai_context|target/|build/|\.gradle/|jniLibs/|secrets"; then
            echo "ERROR: Unsafe file changes detected outside allowed scope. Aborting commit."
            exit 1
          fi
          
          # Explicitly stage allowed paths only
          git add app/ core/ feature/ gradle/ build.gradle.kts settings.gradle.kts gradle.properties README.md .gitignore "${{ env.REPORT_FILE }}"
          
          if git diff --staged --quiet; then
            echo "No valid changes to commit."
          else
            git commit -m "AI(app): apply Gemini app improvement pass"
          fi

      - name: Handle Conflict
        if: env.REBASE_FAILED == 'true'
        run: |
          mkdir -p reports/ai/app
          CONFLICT_FILE="reports/ai/app/conflict-$(date -u +'%Y-%m-%d-%H-%M').md"
          echo "# Rebase Conflict Report" > "$CONFLICT_FILE"
          echo "Failed to rebase $DAILY_BRANCH onto origin/main. Manual resolution required." >> "$CONFLICT_FILE"
          git add "$CONFLICT_FILE"
          git commit -m "AI(app): report rebase conflict"
          git push origin "$DAILY_BRANCH"
          exit 0

      - name: Push Daily Branch
        if: env.REBASE_FAILED != 'true'
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" == "main" ]; then
            echo "ERROR: Direct push to main detected. Aborting."
            exit 1
          fi
          
          if [[ "$CURRENT_BRANCH" == ai/app-* ]]; then
            git push origin "$CURRENT_BRANCH"
          else
            echo "Not on a daily branch. Skipping push."
          fi
