name: AI App Review (Gemini)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'General quality pass'

concurrency:
  group: ai-app-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Secrets should be stored in GitHub Environment: ai-audit
    environment:
      name: ai-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          DAILY_BRANCH="ai/app-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"
          
          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Java 25
        if: env.REBASE_FAILED != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Collect App Scope
        if: env.REBASE_FAILED != 'true'
        run: |
          find app/ core/ feature/ gradle/ -maxdepth 3 -not -path '*/.*' > scope.txt
          echo "build.gradle.kts" >> scope.txt
          echo "settings.gradle.kts" >> scope.txt
          echo "gradle.properties" >> scope.txt

      - name: Gemini Review
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          mkdir -p reports/ai/app
          REPORT_FILE="reports/ai/app/REPORT_$(date -u +'%H-%M').md"
          echo "# Gemini App Review Report - $(date -u)" > "$REPORT_FILE"
          echo "General quality pass requested: ${{ github.event.inputs.reason }}" >> "$REPORT_FILE"
          echo "Placeholder: Real Gemini review output would go here." >> "$REPORT_FILE"
          echo "REPORT_FILE=$REPORT_FILE" >> "$GITHUB_ENV"

      - name: Verify No Source Changes
        if: env.REBASE_FAILED != 'true'
        run: |
          if ! git diff --exit-code -- app/ core/ feature/ gradle/ build.gradle.kts settings.gradle.kts gradle.properties; then
            echo "ERROR: Unintended source changes detected in report-only workflow."
            git diff
            exit 1
          fi

      - name: Validate (App)
        if: env.REBASE_FAILED != 'true'
        run: |
          chmod +x gradlew
          ./gradlew spotlessCheck
          ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Handle Conflict
        if: env.REBASE_FAILED == 'true'
        run: |
          echo "# Rebase Conflict Report" > CONFLICT.md
          echo "Failed to rebase $DAILY_BRANCH onto origin/main. Manual resolution required." >> CONFLICT.md
          git add CONFLICT.md
          git commit -m "AI(app): report rebase conflict"
          git push origin "$DAILY_BRANCH"
          exit 0

      - name: Commit and Push (Strict Guard)
        if: env.REBASE_FAILED != 'true'
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" == "main" ]; then
            echo "ERROR: Direct push to main detected. Aborting."
            exit 1
          fi
          
          git add "$REPORT_FILE"
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "AI(app): daily agreed improvement pass (Gemini only)"
          git push origin "$CURRENT_BRANCH"
