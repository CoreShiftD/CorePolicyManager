name: AI Workflow Factory (Gemini)

on:
  workflow_dispatch:
    inputs:
      workflow_name:
        description: 'Display name for the new workflow'
        required: true
      workflow_filename:
        description: 'Filename (without extension)'
        required: true
      scope_description:
        description: 'File paths or patterns to review'
        required: true
      branch_prefix:
        description: 'Branch prefix (e.g., ai/feature-)'
        required: true
        default: 'ai/factory-'
      validation_commands:
        description: 'Shell commands to validate changes'
        required: false
        default: './gradlew spotlessCheck'
      ai_prompt:
        description: 'Specific instructions for Gemini'
        required: true

permissions:
  contents: write

jobs:
  create-workflow:
    runs-on: ubuntu-latest
    # Secrets should be stored in GitHub Environment: ai-audit
    environment:
      name: ai-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanitize Inputs
        run: |
          FILENAME="${{ github.event.inputs.workflow_filename }}"
          if [[ ! "$FILENAME" =~ ^[a-z0-9_-]+$ ]]; then
            echo "ERROR: Invalid workflow_filename. Use only a-z, 0-9, _ and -."
            exit 1
          fi

      - name: Create Factory Branch from Fresh Main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          BRANCH_NAME="ai/workflow-factory-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"

          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"
          echo "Target Branch: $BRANCH_NAME"

      - name: Generate Workflow File
        run: |
          WORKFLOW_PATH=".github/workflows/${{ github.event.inputs.workflow_filename }}.yml"
          echo "WORKFLOW_PATH=$WORKFLOW_PATH" >> "$GITHUB_ENV"

          cat <<EOF > "$WORKFLOW_PATH"
          name: ${{ github.event.inputs.workflow_name }}
          on:
            workflow_dispatch:
          permissions:
            contents: write
          jobs:
            review:
              runs-on: ubuntu-latest
              environment:
                name: ai-audit
              steps:
                - name: Checkout
                  uses: actions/checkout@v4
                  with:
                    fetch-depth: 0
                - name: Create Review Branch from Fresh Main
                  run: |
                    git fetch origin main
                    git checkout main
                    git reset --hard origin/main
                    BRANCH_NAME="${{ github.event.inputs.branch_prefix }}\${{ github.run_id }}"
                    git checkout -b "\$BRANCH_NAME"
                    echo "BRANCH_NAME=\$BRANCH_NAME" >> "\$GITHUB_ENV"
                - name: Gemini Review Step
                  env:
                    GEMINI_API_KEY: \${{ secrets.GEMINI_API_KEY }}
                  run: |
                    if [ -z "\$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
                    mkdir -p reports/ai/generated
                    REPORT_FILE="reports/ai/generated/\${{ github.event.inputs.workflow_filename }}-\$(date -u +'%Y-%m-%d-%H-%M').md"
                    echo "# Gemini Review Pass" > "\$REPORT_FILE"
                    echo "Reviewing scope: ${{ github.event.inputs.scope_description }}" >> "\$REPORT_FILE"
                    echo "Prompt: ${{ github.event.inputs.ai_prompt }}" >> "\$REPORT_FILE"
                    echo "REPORT_FILE=\$REPORT_FILE" >> "\$GITHUB_ENV"
                - name: Validation
                  run: |
                    ${{ github.event.inputs.validation_commands }}
                - name: Commit and Push (Strict Guard)
                  run: |
                    CURRENT_BRANCH=\$(git rev-parse --abbrev-ref HEAD)
                    if [ "\$CURRENT_BRANCH" == "main" ]; then
                      echo "ERROR: Direct push to main detected. Aborting."
                      exit 1
                    fi
                    git config user.name "github-actions[bot]"
                    git config user.email "github-actions[bot]@users.noreply.github.com"
                    git add "\$REPORT_FILE"
                    if git diff --staged --quiet; then
                      echo "No report to commit."
                    else
                      git commit --signoff -m "AI: add generated review report"
                      git push origin "\$CURRENT_BRANCH"
                    fi
          EOF

      - name: Commit and Push (Strict Guard)
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" == "main" ]; then
            echo "ERROR: Direct push to main detected. Aborting."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$WORKFLOW_PATH"
          git commit --signoff -m "AI(workflows): create requested AI workflow"
          git push origin "$CURRENT_BRANCH"
