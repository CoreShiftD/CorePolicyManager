name: Build CorePolicyManager (Stable Release)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Keystore

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Cache Gradle Wrapper & Caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Android Toolchain Components
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --version
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;28.0.13004108"

      - name: Build Rust Daemon for Android
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          NDK="$SDK_ROOT/ndk/28.0.13004108"
          
          if [ ! -d "$NDK" ]; then
            echo "NDK not found at $NDK"
            ls -R "$SDK_ROOT/ndk" || true
            exit 1
          fi
          
          export ANDROID_NDK_HOME="$NDK"
          export ANDROID_NDK_ROOT="$NDK"
          export PATH="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          
          echo "Using NDK at: $ANDROID_NDK_HOME"
          "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" --version
          
          ./scripts/build-rust-android.sh

      - name: Restore keystore (optional)
        env:
          STORE_FILE_BASE64: ${{ secrets.STORE_FILE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$STORE_FILE_BASE64" ]; then
            echo "No keystore provided, using debug/default signing"
            exit 0
          fi

          if [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Keystore provided but one or more signing secrets are missing."
            exit 1
          fi

          mkdir -p app/keystore
          echo "$STORE_FILE_BASE64" | base64 --decode > app/keystore/release.jks

          cat <<EOK > keystore.properties
          STORE_FILE=app/keystore/release.jks
          STORE_PASSWORD=$STORE_PASSWORD
          KEY_ALIAS=$KEY_ALIAS
          KEY_PASSWORD=$KEY_PASSWORD
          EOK

          echo "RELEASE_SIGNED=true" >> "$GITHUB_ENV"

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --stacktrace --no-daemon

      - name: Verify release signing and ABIs
        if: ${{ env.RELEASE_SIGNED == 'true' }}
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK" ]; then
            echo "No APK found to verify."
            exit 1
          fi
          
          echo "Verifying signing..."
          $ANDROID_HOME/build-tools/36.0.0/apksigner verify --verbose --print-certs "$APK"
          
          echo "Verifying ABIs..."
          UNSUPPORTED_ABIS=$(unzip -l "$APK" | grep "lib/" | grep -vE "lib/(arm64-v8a|armeabi-v7a)/" || true)
          if [ -n "$UNSUPPORTED_ABIS" ]; then
            echo "ERROR: Unsupported ABIs found in APK:"
            echo "$UNSUPPORTED_ABIS"
            exit 1
          fi
          echo "ABI verification passed: Only arm64-v8a and armeabi-v7a detected."

      - name: Build Size Report
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          echo "### Release APK Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Size |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          
          APK_SIZE=$(du -h "$APK" | cut -f1)
          echo "| Total APK | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          
          # Native payload sizes
          echo "#### Native Payloads" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          unzip -l "$APK" | grep "lib/" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Collect release APKs and set tag
        run: |
          set -euo pipefail

          mkdir -p out
          find app/build/outputs/apk/release -name "*.apk" -print -exec cp {} out/ \;

          if ! ls out/*.apk >/dev/null 2>&1; then
            echo "No APK files were produced."
            exit 1
          fi

          VERSION=$(sed -n 's/.*versionName\s*=\s*"\([^"]*\)".*/\1/p' app/build.gradle.kts | head -n1)
          if [ -z "$VERSION" ]; then
            VERSION="0.0.0"
          fi

          echo "TAG_NAME=v$VERSION" >> "$GITHUB_ENV"
          echo "Collected APKs:"
          ls -lah out/

      - name: Force update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ env.TAG_NAME }}"
          git push origin "refs/tags/${{ env.TAG_NAME }}:refs/tags/${{ env.TAG_NAME }}" --force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: out/*.apk
          generate_release_notes: true
          make_latest: true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CorePolicyManager-release-apks
          path: out/*.apk
          retention-days: 7
