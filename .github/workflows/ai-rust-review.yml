name: AI Rust Review (Gemini)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Manual daemon stability pass'
      model:
        description: 'Gemini model to use'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - flash
          - pro
          - flash-lite
      deep_mode:
        description: 'Increase file/line limits for this session'
        type: boolean
        default: false
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: ai-rust-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    environment:
      name: ai-audit

    env:
      SESSION_SECONDS: 1800
      IMPROVE_UNTIL_SECONDS: 1500
      PASS_SLEEP_SECONDS: 10
      MAX_FAILED_PASSES: 3
      MAX_NO_CHANGE_PASSES: 3
      MAX_RECOVERY_PASSES: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          DAILY_BRANCH="ai/rust-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"
          
          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Node
        if: env.REBASE_FAILED != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Gemini CLI
        if: env.REBASE_FAILED != 'true'
        run: npm install -g @google/gemini-cli

      - name: Setup Rust
        if: env.REBASE_FAILED != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;28.0.13004108"

      - name: Verify Main Formatting
        if: env.REBASE_FAILED != 'true'
        run: |
          cd rust
          if ! cargo fmt --check; then
            echo "ERROR: Main branch Rust formatting is invalid. Run cargo fmt on main first."
            exit 1
          fi

      - name: Diagnostics and Model Selection
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_MODEL: ${{ github.event.inputs.model || 'auto' }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          echo "Fetching available models..."
          curl -s "https://generativelanguage.googleapis.com/v1beta/models?key=$GEMINI_API_KEY" > models_raw.json
          AVAILABLE_MODELS=$(jq -r '.models[] | select(.supportedGenerationMethods[]? == "generateContent") | .name' models_raw.json | sed 's/models\///')
          
          case "$INPUT_MODEL" in
            pro) REQUESTED="gemini-2.5-pro gemini-2.0-pro gemini-1.5-pro" ;;
            flash-lite) REQUESTED="gemini-2.5-flash-lite gemini-2.0-flash-lite gemini-1.5-flash-8b" ;;
            *) REQUESTED="gemini-2.5-flash gemini-2.0-flash gemini-1.5-flash-latest" ;;
          esac

          FALLBACK_ORDER="$REQUESTED gemini-2.5-flash gemini-2.0-flash gemini-1.5-flash-latest"
          RESOLVED_MODEL=""
          for m in $FALLBACK_ORDER; do
            if echo "$AVAILABLE_MODELS" | grep -q "^$m$"; then RESOLVED_MODEL="$m"; break; fi
          done
          if [ -z "$RESOLVED_MODEL" ]; then echo "No supported model found"; exit 1; fi
          echo "SELECTED_MODEL=$RESOLVED_MODEL" >> "$GITHUB_ENV"

      - name: AI Session Loop
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          DEEP_MODE: ${{ github.event.inputs.deep_mode }}
        run: |
          START_TIME=$(date +%s)
          FAILED_PASSES=0
          NO_CHANGE_PASSES=0
          PASS_COUNT=0
          COMMITS_CREATED=0
          RECOVERY_MODE=false
          RECOVERY_COUNT=0
          LAST_FAILURE_LOG=""
          STRATEGIES=("correctness" "test coverage" "clippy warnings" "error handling" "cleanup" "docs accuracy" "logging/observability" "performance")
          STRATEGY_INDEX=0
          STOP_REASON="time_budget_reached"
          
          # Patch limits
          if [ "$DEEP_MODE" = "true" ]; then
            LIMIT_FILES=5
            LIMIT_LINES=300
          else
            LIMIT_FILES=3
            LIMIT_LINES=180
          fi
          
          mkdir -p session_artifacts/rust
          SUMMARY_FILE="session_artifacts/rust/session-summary.md"
          echo "# AI Rust Maintenance Session Summary" > "$SUMMARY_FILE"
          echo "- **Started at**: $(date -u)" >> "$SUMMARY_FILE"
          echo "- **Model**: ${{ env.SELECTED_MODEL }}" >> "$SUMMARY_FILE"
          echo "" >> "$SUMMARY_FILE"
          echo "| Pass | Strategy | Status | Lines | Files | Commit |" >> "$SUMMARY_FILE"
          echo "| --- | --- | --- | --- | --- | --- |" >> "$SUMMARY_FILE"
          
          echo "### Session Progress" >> $GITHUB_STEP_SUMMARY
          echo "| Pass | Strategy | Status | Lines | Files | Commit |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- | --- | --- | --- | --- |" >> $GITHUB_STEP_SUMMARY

          while [ $(( $(date +%s) - START_TIME )) -lt $IMPROVE_UNTIL_SECONDS ]; do
            PASS_COUNT=$((PASS_COUNT + 1))
            CURRENT_STRATEGY=${STRATEGIES[$STRATEGY_INDEX]}
            ELAPSED=$(( $(date +%s) - START_TIME ))
            
            echo "::group::AI Pass $PASS_COUNT - $CURRENT_STRATEGY"
            echo "PASS=$PASS_COUNT strategy=$CURRENT_STRATEGY elapsed=${ELAPSED}s"
            
            PASS_DIR="session_artifacts/rust/pass-$PASS_COUNT"
            mkdir -p "$PASS_DIR"
            
            if [ "$RECOVERY_MODE" = "true" ]; then
              echo "Entering RECOVERY MODE (Attempt $((RECOVERY_COUNT + 1)))"
              ERROR_SUMMARY=$(cat "$LAST_FAILURE_LOG" | head -n 50)
              PROMPT="You are a senior maintenance engineer. You previously made a change that failed validation. Fix the compile/test errors below. Do not make unrelated changes. Return/edit only the minimum necessary fix. All commits you suggest or perform must use DCO signoff (git commit --signoff).
              Error log:
              $ERROR_SUMMARY
              End with SUMMARY: fixed previous validation errors."
            else
              if ! git diff --quiet || ! git diff --cached --quiet; then
                git restore --worktree --staged .
                git clean -fd --exclude=session_artifacts/
              fi
              
              if [ $NO_CHANGE_PASSES -gt 0 ]; then
                AGGR_HINT="You previously returned no changes. You MUST inspect files and make a useful safe edit if any exists. Explicitly allow docs/tests/cleanup if code changes are not obvious. Do not return without editing unless there is truly nothing safe."
              else
                AGGR_HINT=""
              fi
              
              PROMPT="You are a senior maintenance engineer working on the CoreShift Rust daemon. Task: make one focused, high-value, low-risk improvement in the category: $CURRENT_STRATEGY. Priorities: failing tests, missing tests, clippy, safety, IPC robustness. Avoid trivial edits. Max $LIMIT_FILES files and $LIMIT_LINES lines. All commits you suggest or perform must use DCO signoff (git commit --signoff). Stop after one focused change. $AGGR_HINT End with SUMMARY: <short description>."
            fi
            
            gemini --model "${{ env.SELECTED_MODEL }}" --approval-mode=auto_edit --skip-trust --prompt "$PROMPT" > "$PASS_DIR/gemini_output.txt" 2>&1 || true
            
            git diff > "$PASS_DIR/git-diff.patch"
            git status --short > "$PASS_DIR/status.txt"
            
            STATUS="unknown"
            L_LINES=0
            L_FILES=0
            L_HASH="-"

            if [ ! -s "$PASS_DIR/git-diff.patch" ]; then
              if [ "$RECOVERY_MODE" = "true" ]; then
                echo "Recovery produced no changes. This is a recovery failure."
                git restore --worktree --staged .
                git clean -fd --exclude=session_artifacts/
                RECOVERY_MODE=false
                FAILED_PASSES=$((FAILED_PASSES + 1))
                STATUS="recovery_no_change"
              else
                echo "No changes."
                NO_CHANGE_PASSES=$((NO_CHANGE_PASSES + 1))
                STATUS="no_change"
                if [ $NO_CHANGE_PASSES -ge $MAX_NO_CHANGE_PASSES ]; then
                   echo "No-change threshold reached; rotating strategy."
                   NO_CHANGE_PASSES=0
                   STRATEGY_INDEX=$(( (STRATEGY_INDEX + 1) % ${#STRATEGIES[@]} ))
                fi
              fi
              echo "::notice title=AI Pass::$PASS_COUNT strategy=$CURRENT_STRATEGY status=$STATUS"
            else
              L_FILES=$(git diff --name-only | wc -l)
              L_LINES=$(git diff --shortstat | awk '{print ($4 + $6)}' || echo 0)
              
              if [ "$L_FILES" -gt "$LIMIT_FILES" ] || [ "$L_LINES" -gt "$LIMIT_LINES" ] || (git status --short | grep -E "ai_context|target/|build/|\.gradle/|jniLibs/|secrets"); then
                echo "::error title=AI Unsafe Change::Rejected unsafe or too large ($L_FILES files, $L_LINES lines)"
                git restore --worktree --staged .
                git clean -fd --exclude=session_artifacts/
                RECOVERY_MODE=false
                FAILED_PASSES=$((FAILED_PASSES + 1))
                STATUS="rejected_safety"
              else
                echo "Validating pass $PASS_COUNT..."
                cd rust
                if cargo fmt && cargo fmt --check && cargo check && cargo test && cargo clippy --all-targets --all-features -- -D warnings; then
                  cd ..
                  SUMMARY=$(grep "SUMMARY:" "$PASS_DIR/gemini_output.txt" | tail -n 1 | sed 's/SUMMARY: //')
                  if [ -z "$SUMMARY" ]; then SUMMARY="improvement in $CURRENT_STRATEGY"; fi
                  git add rust/ scripts/ docs/ README.md .gitignore
                  git commit --signoff -m "AI(rust): $SUMMARY"
                  L_HASH=$(git rev-parse --short HEAD)
                  echo "::notice title=AI Commit::Created commit $L_HASH"
                  COMMITS_CREATED=$((COMMITS_CREATED + 1))
                  FAILED_PASSES=0
                  NO_CHANGE_PASSES=0
                  RECOVERY_MODE=false
                  RECOVERY_COUNT=0
                  STATUS="success"
                else
                  cd ..
                  echo "::warning title=AI Validation Failed::Pass $PASS_COUNT failed validation"
                  LAST_FAILURE_LOG="$PASS_DIR/validation.log"
                  cd rust && (cargo check && cargo test && cargo clippy --all-targets --all-features -- -D warnings) > "../$LAST_FAILURE_LOG" 2>&1 || true
                  cd ..
                  RECOVERY_COUNT=$((RECOVERY_COUNT + 1))
                  if [ $RECOVERY_COUNT -ge $MAX_RECOVERY_PASSES ]; then
                    echo "Max recovery attempts reached. Reverting."
                    git restore --worktree --staged .
                    git clean -fd --exclude=session_artifacts/
                    RECOVERY_MODE=false
                    RECOVERY_COUNT=0
                    FAILED_PASSES=$((FAILED_PASSES + 1))
                    STATUS="recovery_failed"
                  else
                    RECOVERY_MODE=true
                    STATUS="recovering"
                  fi
                fi
              fi
            fi
            
            echo "status=$STATUS" >> "$PASS_DIR/status.txt"
            echo "| $PASS_COUNT | $CURRENT_STRATEGY | $STATUS | $L_LINES | $L_FILES | $L_HASH |" >> "$SUMMARY_FILE"
            echo "| $PASS_COUNT | $CURRENT_STRATEGY | $STATUS | $L_LINES | $L_FILES | $L_HASH |" >> $GITHUB_STEP_SUMMARY
            
            if [ $FAILED_PASSES -ge $MAX_FAILED_PASSES ]; then 
              echo "STOP: Max failed passes reached."
              STOP_REASON="max_failed_passes"
              break
            fi
            echo "::endgroup::"
            sleep $PASS_SLEEP_SECONDS
          done
          
          if [ $(( $(date +%s) - START_TIME )) -ge $IMPROVE_UNTIL_SECONDS ]; then
            echo "::notice title=AI Session::Time budget reached."
          fi

          echo "" >> "$SUMMARY_FILE"
          echo "- **Ended at**: $(date -u)" >> "$SUMMARY_FILE"
          echo "- **Total Commits**: $COMMITS_CREATED" >> "$SUMMARY_FILE"
          echo "- **Stop Reason**: $STOP_REASON" >> "$SUMMARY_FILE"

      - name: Final Validation and Push
        if: env.REBASE_FAILED != 'true'
        run: |
          git restore --staged app/src/main/jniLibs || true
          git restore app/src/main/jniLibs || true
          
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export ANDROID_NDK_HOME="$SDK_ROOT/ndk/28.0.13004108"
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          ./scripts/build-rust-android.sh
          
          if [[ "${{ env.DAILY_BRANCH }}" == ai/rust-* ]]; then
            git fetch origin "${{ env.DAILY_BRANCH }}"
            git rebase "origin/${{ env.DAILY_BRANCH }}" || (git rebase --abort && exit 0)
            git push origin "${{ env.DAILY_BRANCH }}"
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-rust-session-artifacts
          path: session_artifacts/
          retention-days: 3
