name: AI Rust Review (Gemini)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Manual daemon stability pass'
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: ai-rust-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    environment:
      name: ai-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          DAILY_BRANCH="ai/rust-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"

          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Rust
        if: env.REBASE_FAILED != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;28.0.13004108"

      - name: Verify Main Formatting
        if: env.REBASE_FAILED != 'true'
        run: |
          cd rust
          if ! cargo fmt --check; then
            echo "ERROR: Main branch Rust formatting is invalid. Run cargo fmt on main first."
            exit 1
          fi

      - name: Gemini Review
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          mkdir -p reports/ai/rust
          REPORT_ID=$(date -u +'%Y-%m-%d-%H-%M')
          REPORT_FILE="reports/ai/rust/report-$REPORT_ID.md"

          echo "# Gemini Rust Review Report - $REPORT_ID" > "$REPORT_FILE"
          echo "Gemini invocation not fully implemented yet; report-only placeholder." >> "$REPORT_FILE"
          echo "REPORT_FILE=$REPORT_FILE" >> "$GITHUB_ENV"

      - name: Validate (Rust)
        if: env.REBASE_FAILED != 'true'
        run: |
          cd rust
          cargo fmt --check
          cargo check
          cargo test
          cargo clippy --all-targets --all-features -- -D warnings

          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export ANDROID_NDK_HOME="$SDK_ROOT/ndk/28.0.13004108"
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"

          cd ..
          bash -n scripts/build-rust-android.sh
          ./scripts/build-rust-android.sh

      - name: Handle Conflict
        if: env.REBASE_FAILED == 'true'
        run: |
          mkdir -p reports/ai/rust
          CONFLICT_FILE="reports/ai/rust/conflict-$(date -u +'%Y-%m-%d-%H-%M').md"
          echo "# Rebase Conflict Report" > "$CONFLICT_FILE"
          echo "Failed to rebase $DAILY_BRANCH onto origin/main. Manual resolution required." >> "$CONFLICT_FILE"
          git add "$CONFLICT_FILE"
          git commit -m "AI(rust): report rebase conflict"
          git push origin "$DAILY_BRANCH"
          exit 0

      - name: Commit and Push (Strict Guard)
        if: env.REBASE_FAILED != 'true'
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" == "main" ]; then
            echo "ERROR: Direct push to main detected. Aborting."
            exit 1
          fi

          git add "$REPORT_FILE"
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "AI(rust): add scheduled Gemini audit report"
          git push origin "$CURRENT_BRANCH"
