name: AI Rust Review (Dual-Agent)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Daemon stability pass'

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch origin/main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create Review Branch
        run: |
          BRANCH_NAME="ai/rust-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      - name: Collect Rust Scope
        run: |
          find rust/ -maxdepth 3 -not -path '*/.*' > scope.txt
          echo "scripts/build-rust-android.sh" >> scope.txt
          echo "docs/android-build.md" >> scope.txt
          echo "docs/runtime-notes.md" >> scope.txt

      - name: Codex Review
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          if [ -z "$CODEX_API_KEY" ]; then echo "CODEX_API_KEY missing"; exit 1; fi
          echo '{"proposal": "Rust daemon quality review placeholder from Codex"}' > codex_proposal.json

      - name: Gemini Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          echo '{"proposal": "Rust daemon quality review placeholder from Gemini"}' > gemini_proposal.json

      - name: Determine Agreement
        run: |
          echo "# AI Rust Review Report" > REPORT.md
          echo "## Codex Opinion" >> REPORT.md
          cat codex_proposal.json >> REPORT.md
          echo "## Gemini Opinion" >> REPORT.md
          cat gemini_proposal.json >> REPORT.md

      - name: Validate (Rust)
        run: |
          cd rust
          cargo fmt --check || true
          cargo check
          cargo test
          bash -n ../scripts/build-rust-android.sh

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add REPORT.md
          git commit -m "AI(rust): apply dual-agent agreed improvement pass"
          git push origin "${{ env.BRANCH_NAME }}"
