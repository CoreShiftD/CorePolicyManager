name: AI Rust Review (Gemini)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Manual daemon stability pass'
      model:
        description: 'Gemini model to use'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - flash
          - pro
          - flash-lite
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: ai-rust-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    timeout-minutes: 35
    runs-on: ubuntu-latest
    environment:
      name: ai-audit

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          DAILY_BRANCH="ai/rust-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"
          
          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Rust
        if: env.REBASE_FAILED != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;28.0.13004108"

      - name: Verify Main Formatting
        if: env.REBASE_FAILED != 'true'
        run: |
          cd rust
          if ! cargo fmt --check; then
            echo "ERROR: Main branch Rust formatting is invalid. Run cargo fmt on main first."
            exit 1
          fi

      - name: Gemini Code Improvement
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INPUT_MODEL: ${{ github.event.inputs.model || 'auto' }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          
          # Resolve requested model
          case "$INPUT_MODEL" in
            pro) MODEL_NAME="gemini-1.5-pro" ;;
            flash-lite) MODEL_NAME="gemini-1.5-flash-8b" ;;
            *) MODEL_NAME="gemini-1.5-flash" ;;
          esac
          echo "RESOLVED_MODEL=$MODEL_NAME" >> "$GITHUB_ENV"
          
          {
            find rust/ -type f -not -path '*/.*' -not -name "*.so" -not -name "*.lock" -maxdepth 4
            echo "scripts/build-rust-android.sh"
            echo "docs/android-build.md"
            echo "docs/runtime-notes.md"
            echo "README.md"
            echo ".gitignore"
          } | while read -r f; do
            if [ -f "$f" ]; then
              echo "--- FILE: $f ---"
              cat "$f"
              echo ""
            fi
          done > full_context.txt

          PROMPT_PREFIX="You are running as a conservative maintenance bot. Return ONLY a unified diff patch. Make at most one small improvement. Limit changes to 3 files and 120 changed lines total. Prefer formatting, lint fixes, docs alignment, small tests, and obvious maintainability cleanup. Do not redesign architecture. Do not add dependencies. Do not touch secrets or generated artifacts. If no safe patch exists, return exactly: NO_PATCH"
          
          jq -n --arg prefix "$PROMPT_PREFIX" --rawfile context full_context.txt \
            '{contents: [{parts: [{text: ($prefix + "\n\nFiles:\n" + $context)}]}]}' > payload.json

          # Attempt call with fallback
          echo "Calling Gemini with model: $MODEL_NAME"
          curl -s -X POST -H 'Content-Type: application/json' \
            -d @payload.json \
            "https://generativelanguage.googleapis.com/v1beta/models/$MODEL_NAME:generateContent?key=$GEMINI_API_KEY" > response.json

          # Check for quota/error if Pro was requested
          if [ "$MODEL_NAME" == "gemini-1.5-pro" ] && jq -e '.error' response.json > /dev/null; then
            echo "Pro quota exceeded or error detected. Falling back to Flash."
            MODEL_NAME="gemini-1.5-flash"
            echo "RESOLVED_MODEL=$MODEL_NAME (fallback)" >> "$GITHUB_ENV"
            curl -s -X POST -H 'Content-Type: application/json' \
              -d @payload.json \
              "https://generativelanguage.googleapis.com/v1beta/models/$MODEL_NAME:generateContent?key=$GEMINI_API_KEY" > response.json
          fi

          RAW_RESPONSE=$(jq -r '.candidates[0].content.parts[0].text // empty' response.json)
          
          if [ -z "$RAW_RESPONSE" ] || [ "$RAW_RESPONSE" == "NO_PATCH" ]; then
            echo "PATCH_PRODUCED=none" >> "$GITHUB_ENV"
          else
            echo "$RAW_RESPONSE" | sed '/^```/d' > gemini.patch
            if [ ! -s gemini.patch ] || ! grep -q "^diff --git" gemini.patch; then
              echo "PATCH_PRODUCED=false" >> "$GITHUB_ENV"
            else
              if git apply --check gemini.patch; then
                git apply gemini.patch
                
                FILES_CHANGED=$(git diff --name-only | wc -l)
                LINES_CHANGED=$(git diff --shortstat | awk '{print ($4 + $6)}' || echo 0)
                
                if [ "$FILES_CHANGED" -gt 3 ] || [ "$LINES_CHANGED" -gt 120 ]; then
                  echo "ERROR: Patch exceeded limits (Files: $FILES_CHANGED, Lines: $LINES_CHANGED)"
                  git checkout .
                  echo "PATCH_PRODUCED=exceeded_limits" >> "$GITHUB_ENV"
                else
                  echo "PATCH_PRODUCED=true" >> "$GITHUB_ENV"
                fi
              else
                echo "PATCH_PRODUCED=invalid" >> "$GITHUB_ENV"
              fi
            fi
          fi

      - name: Validate (Rust)
        if: env.REBASE_FAILED != 'true' && env.PATCH_PRODUCED == 'true'
        run: |
          cd rust
          cargo fmt
          cargo fmt --check
          cargo check
          cargo test
          cargo clippy --all-targets --all-features -- -D warnings
          
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export ANDROID_NDK_HOME="$SDK_ROOT/ndk/28.0.13004108"
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          
          cd ..
          bash -n scripts/build-rust-android.sh
          ./scripts/build-rust-android.sh

      - name: Cleanup Build Artifacts
        if: env.REBASE_FAILED != 'true'
        run: |
          git restore --staged app/src/main/jniLibs || true
          git restore app/src/main/jniLibs || true
          rm -f full_context.txt payload.json response.json gemini.patch

      - name: Inspect and Commit
        if: env.REBASE_FAILED != 'true'
        run: |
          if [ "$PATCH_PRODUCED" == "true" ]; then
            git status --short
            
            if git status --short | grep -E "ai_context|target/|build/|\.gradle/|jniLibs/|secrets"; then
              echo "ERROR: Unsafe file changes detected. Reverting."
              git checkout .
              exit 1
            fi
            
            git add rust/ scripts/ docs/ README.md .gitignore
            if ! git diff --staged --quiet; then
              git commit -m "AI(rust): apply Gemini patch (model=${{ env.RESOLVED_MODEL }})"
            fi
          else
            mkdir -p reports/ai/rust
            REPORT_FILE="reports/ai/rust/audit-$(date -u +'%Y-%m-%d-%H-%M').md"
            echo "# Gemini Audit - No Patch Applied" > "$REPORT_FILE"
            echo "Model: ${{ env.RESOLVED_MODEL }}" >> "$REPORT_FILE"
            echo "Reason: $PATCH_PRODUCED" >> "$REPORT_FILE"
            git add "$REPORT_FILE"
            git commit -m "AI(rust): record Gemini no-op audit (model=${{ env.RESOLVED_MODEL }})"
          fi

      - name: Handle Conflict
        if: env.REBASE_FAILED == 'true'
        run: |
          mkdir -p reports/ai/rust
          CONFLICT_FILE="reports/ai/rust/conflict-$(date -u +'%Y-%m-%d-%H-%M').md"
          echo "# Rebase Conflict Report" > "$CONFLICT_FILE"
          echo "Failed to rebase $DAILY_BRANCH onto origin/main." >> "$CONFLICT_FILE"
          git add "$CONFLICT_FILE"
          git commit -m "AI(rust): report rebase conflict"
          git push origin "$DAILY_BRANCH"
          exit 0

      - name: Push Daily Branch
        if: env.REBASE_FAILED != 'true'
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" == "main" ]; then
            echo "ERROR: Direct push to main detected."
            exit 1
          fi
          if [[ "$CURRENT_BRANCH" == ai/rust-* ]]; then
            git push origin "$CURRENT_BRANCH"
          fi
