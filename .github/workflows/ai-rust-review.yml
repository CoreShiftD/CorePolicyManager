name: AI Rust Review (Dual-Agent)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for review (optional)'
        required: false
        default: 'Daemon stability pass'
  schedule:
    - cron: "0 * * * *"

concurrency:
  group: ai-rust-review-daily
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Daily Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin main
          DAILY_BRANCH="ai/rust-$(date -u +'%Y-%m-%d')"
          echo "DAILY_BRANCH=$DAILY_BRANCH" >> "$GITHUB_ENV"
          
          if git fetch origin "$DAILY_BRANCH"; then
            echo "Branch $DAILY_BRANCH exists. Updating."
            git checkout "$DAILY_BRANCH"
            if ! git rebase origin/main; then
              echo "Rebase conflict detected. Aborting."
              git rebase --abort
              echo "REBASE_FAILED=true" >> "$GITHUB_ENV"
            fi
          else
            echo "Branch $DAILY_BRANCH does not exist. Creating."
            git checkout -b "$DAILY_BRANCH" origin/main
          fi

      - name: Setup Rust
        if: env.REBASE_FAILED != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Setup Android SDK
        if: env.REBASE_FAILED != 'true'
        uses: android-actions/setup-android@v3

      - name: Install NDK
        if: env.REBASE_FAILED != 'true'
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "ndk;28.0.13004108"

      - name: Collect Rust Scope
        if: env.REBASE_FAILED != 'true'
        run: |
          find rust/ -maxdepth 3 -not -path '*/.*' > scope.txt
          echo "scripts/build-rust-android.sh" >> scope.txt
          echo "docs/android-build.md" >> scope.txt
          echo "docs/runtime-notes.md" >> scope.txt

      - name: Codex Review
        if: env.REBASE_FAILED != 'true'
        env:
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
        run: |
          if [ -z "$CODEX_API_KEY" ]; then echo "CODEX_API_KEY missing"; exit 1; fi
          echo '{"proposal": "Rust daemon quality review placeholder from Codex"}' > codex_proposal.json

      - name: Gemini Review
        if: env.REBASE_FAILED != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then echo "GEMINI_API_KEY missing"; exit 1; fi
          echo '{"proposal": "Rust daemon quality review placeholder from Gemini"}' > gemini_proposal.json

      - name: Determine Agreement
        if: env.REBASE_FAILED != 'true'
        run: |
          REPORT_FILE="REPORT_$(date -u +'%H-%M').md"
          echo "# AI Rust Review Report - $(date -u)" > "$REPORT_FILE"
          echo "## Codex Opinion" >> "$REPORT_FILE"
          cat codex_proposal.json >> "$REPORT_FILE"
          echo "## Gemini Opinion" >> "$REPORT_FILE"
          cat gemini_proposal.json >> "$REPORT_FILE"

      - name: Validate (Rust)
        if: env.REBASE_FAILED != 'true'
        run: |
          cd rust
          cargo fmt --check
          cargo check
          cargo test
          cargo clippy --all-targets --all-features -- -D warnings
          
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          export ANDROID_NDK_HOME="$SDK_ROOT/ndk/28.0.13004108"
          export PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          
          cd ..
          bash -n scripts/build-rust-android.sh
          ./scripts/build-rust-android.sh

      - name: Handle Conflict
        if: env.REBASE_FAILED == 'true'
        run: |
          echo "# Rebase Conflict Report" > CONFLICT.md
          echo "Failed to rebase $DAILY_BRANCH onto origin/main. Manual resolution required." >> CONFLICT.md
          git add CONFLICT.md
          git commit -m "AI(rust): report rebase conflict"
          git push origin "$DAILY_BRANCH" --force
          exit 0

      - name: Commit and Push (Strict Guard)
        if: env.REBASE_FAILED != 'true'
        run: |
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$CURRENT_BRANCH" == "main" ]; then
            echo "ERROR: Direct push to main detected. Aborting."
            exit 1
          fi

          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "AI(rust): hourly agreed improvement pass"
          git push origin "$CURRENT_BRANCH"
